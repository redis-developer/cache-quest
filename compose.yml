name: "redis-adventure"
services:
  redis:
    container_name: redis
    image: "redis:alpine"
    ports:
      - 6379:6379
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-data:/data

  game:
    container_name: game
    build: .
    ports:
      - 3000:3000
    env_file:
      - ./.env
      - ./.env.docker
    restart: unless-stopped
    depends_on:
      - redis
volumes:
  redis-data:
